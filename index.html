<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Predictor de Comportamiento</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Predictor de Comportamiento del Consumidor</h1>

  <div class="container">

    <!-- FORMULARIO -->
    <div class="card formulario">

      <label>Edad:</label>
      <input type="number" id="edad" value="25">

      <label>Experiencia con el producto:</label>
      <select id="nivel">
        <option value="0">Baja</option>
        <option value="1">Media</option>
        <option value="2">Alta</option>
      </select>

      <!-- PRECIO POR TRAMOS -->
      <label>Rango de precio:</label>
      <select id="precio">
        <option value="0">0 - 20.000</option>
        <option value="1">20.000 - 50.000</option>
        <option value="2">50.000 - 100.000</option>
        <option value="3">100.000 - 500.000</option>
        <option value="4">500.000 - 1M</option>
        <option value="5">1M - 5M</option>
        <option value="6">5M - 10M</option>
        <option value="7">+10M</option>
      </select>

      <label>
        Rating 
        <small>(1-2 baja, 3 media, 4-5 alta)</small>
      </label>
      <input type="number" id="rating" step="0.1" min="1" max="5" value="4">

      <label>Número de reseñas:</label>
      <input type="number" id="reviews" value="500">

      <label>Influencer:</label>
      <select id="influencer">
        <option value="1">Sí</option>
        <option value="0">No</option>
      </select>

      <label>Experiencia directa con el producto:</label>
      <select id="demo">
        <option value="1">Sí</option>
        <option value="0">No</option>
      </select>

      <label>Canal:</label>
      <select id="canal">
        <option value="redes">Redes Sociales</option>
        <option value="tv">TV</option>
        <option value="radio">Radio</option>
      </select>

      <label>Nicho:</label>
      <select id="nicho">
        <option value="tecnologia">Tecnología</option>
        <option value="alimentos">Alimentos</option>
        <option value="cosmetica">Cosmética</option>
        <option value="transportes">Transportes</option>
        <option value="vestuario">Vestuario</option>
        <option value="libros">Libros</option>
      </select>

      <label>Tipo de usuario:</label>
      <select id="tipoUsuario">
        <option value="impulsivo">Impulsivo</option>
        <option value="analitico">Analítico</option>
        <option value="desconfiado">Desconfiado</option>
      </select>

      <label>Urgencia de compra (0 a 1):</label>
      <input type="number" id="urgencia" step="0.1" min="0" max="1" value="0.5">

      <button onclick="predecirUI()">Predecir</button>
    <div class="card">

    <div class="resultado-box" id="resultado">
        0%
    </div>

    <div class="subtexto">
        Probabilidad de conversión
    </div>

    <!-- BARRA -->
    <div class="barra-container">
        <div id="barra" class="barra"></div>
    </div>

    <!-- EXPLICACIÓN -->
    <div class="explicacion-box" id="explicacion">
        Aquí aparecerá la explicación...
    </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
